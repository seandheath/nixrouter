# This is a placeholder file. To properly encrypt secrets:
#
# 1. Create an age key (if not already done):
#    age-keygen -o /nix/persist/var/lib/sops-nix/key.txt
#
# 2. Get the public key:
#    age-keygen -y /nix/persist/var/lib/sops-nix/key.txt
#
# 3. Create .sops.yaml in the repo root with your public key:
#    keys:
#      - &router age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
#    creation_rules:
#      - path_regex: secrets/.*\.yaml$
#        key_groups:
#          - age:
#            - *router
#
# 4. Encrypt this file:
#    sops secrets/secrets.yaml
#
# Example secrets structure (plaintext before encryption):
#
# ddclient:
#   cloudflare-token: "your-api-token-here"
#   namecheap-password: "your-password-here"
#
# wifi:
#   password: "your-wifi-password"
#
# admin:
#   password-hash: "$6$..."

